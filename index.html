    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#000;--bg2:#0A0A0A;--card:#111;--border:#222;--red:#db1514;--red-b:#ef2020;--red-glow:rgba(219,21,20,0.4);--red-s:rgba(219,21,20,0.08);--red-s2:rgba(219,21,20,0.15);--fg:#FFF;--fg8:rgba(255,255,255,0.8);--fg6:rgba(255,255,255,0.6);--fg4:rgba(255,255,255,0.4);--fg2:rgba(255,255,255,0.2);--fg05:rgba(255,255,255,0.05);--chk:repeating-conic-gradient(var(--border)0% 25%,var(--bg2)0% 50%)0 0/20px 20px}
        [data-theme="light"]{--bg:#F5F5F5;--bg2:#EAEAEA;--card:#FFF;--border:#D0D0D0;--red-s:rgba(219,21,20,0.06);--red-s2:rgba(219,21,20,0.1);--fg:#111;--fg8:rgba(0,0,0,0.8);--fg6:rgba(0,0,0,0.6);--fg4:rgba(0,0,0,0.4);--fg2:rgba(0,0,0,0.2);--fg05:rgba(0,0,0,0.05);--chk:repeating-conic-gradient(var(--border)0% 25%,#fff 0% 50%)0 0/20px 20px}
        *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;transition:background .35s,color .35s}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:99px}
        .navbar-c{background:#000!important;border-bottom:1px solid #222;padding:10px 0;z-index:1050}.navbar-c.scrolled{box-shadow:0 4px 30px rgba(219,21,20,0.15)}
        .nb-link{display:flex;align-items:center;gap:10px;text-decoration:none}
        .nb-logo{height:34px;width:auto;object-fit:contain;flex-shrink:0}
        .nb-text{font-weight:800;font-size:.88rem;color:#FFF!important;letter-spacing:.03em;line-height:1.15}.nb-text span{color:var(--red)}

        .bg2{position:fixed;bottom:-300px;right:-150px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(219,21,20,0.04)0%,transparent 70%);pointer-events:none;z-index:0}

        .up-t{font-size:1.3rem;font-weight:900;color:var(--fg8);margin-bottom:8px;letter-spacing:.1em;transition:color .35s}
        .up-f1{font-size:.82rem;color:var(--fg4);margin-bottom:2px;transition:color .35s}
        .up-f2{font-size:.78rem;color:var(--fg4);transition:color .35s}

        .ba-lbl{position:absolute;top:8px;left:8px;padding:4px 12px;border-radius:6px;font-size:.65rem;font-weight:700;letter-spacing:.06em;z-index:2;text-transform:uppercase}

        .pal-swatch{width:36px;height:36px;border-radius:10px;cursor:pointer;border:2.5px solid transparent;transition:all .2s;flex-shrink:0}
        .pal-swatch:hover{transform:scale(1.15)}
        .pal-swatch.active{border-color:var(--red);box-shadow:0 0 0 2px var(--red-glow)}
        .pal-swatch.transparent-swatch{background:var(--chk);border:2.5px dashed var(--border)}

        .pal-center{position:relative;width:56px;height:56px;border-radius:14px;overflow:hidden;cursor:pointer;border:2px solid var(--border);transition:all .3s;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--fg05)}

        .pal-center.active{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}

        .pal-center:hover i{color:var(--red)}
        .pal-center-color{position:absolute;inset:0;border-radius:12px;opacity:0;transition:opacity .2s}
        .pal-center.has-color .pal-center-color{opacity:1}
        .pal-center.has-color i{color:#fff;mix-blend-mode:difference}
        .pal-center input[type="color"]{position:absolute;inset:0;width:100%;height:100%;border:none;padding:0;cursor:pointer;opacity:0}
        @media(max-width:576px){.pal-swatch{width:30px;height:30px;border-radius:8px}.pal-center{width:46px;height:46px;border-radius:12px}.pal-center i{font-size:1.1rem}.palette-layout{gap:6px}.pal-side{gap:6px}}
        .ra{padding:12px 20px 20px;display:flex;gap:10px;flex-wrap:wrap}
        .ra .btn-r,.ra .btn-d{flex:1;min-width:70px;justify-content:center}
        .po{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:9998;align-items:center;justify-content:center}.po.a{display:flex}
        .pb2{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px;text-align:center;max-width:340px;width:90%;transition:background .35s,border-color .35s}
        .psp{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .pb2 h5{font-weight:700;color:var(--fg);font-size:.95rem;transition:color .35s}
        .ppb{height:5px;border-radius:99px;background:var(--border);overflow:hidden;transition:background .35s;margin-top:14px}
        .ppf{height:100%;border-radius:99px;background:var(--red);transition:width .3s ease;width:0%}
        .pps{font-size:.72rem;color:var(--fg4);margin-top:8px;transition:color .35s}
        .so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:9997;align-items:center;justify-content:center}.so.a{display:flex}
        .sb2{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;text-align:center;max-width:360px;width:90%;transition:background .35s,border-color .35s}
        .sb2 h5{font-weight:700;margin-bottom:18px;color:var(--fg);font-size:.9rem;transition:color .35s}
        .si-r{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
        .si{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff;transition:all .3s;cursor:pointer;text-decoration:none}
        .si:hover{transform:scale(1.15)}
        .si.wa{background:#25D366}.si.fb{background:#1877F2}.si.ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}.si.tg{background:#0088CC}.si.tw{background:#1DA1F2}
        .sc2{margin-top:16px;background:var(--fg05);border:1px solid var(--border);color:var(--fg6);padding:8px 22px;border-radius:10px;font-weight:600;font-size:.8rem;cursor:pointer;transition:all .3s}
        .sc2:hover{border-color:var(--red);color:var(--red)}
        .tw2{position:fixed;top:70px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
        .ti2{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:.8rem;font-weight:500;color:var(--fg8);animation:tIn .3s ease;min-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.3);transition:background .35s,border-color .35s}
        .ti2.success{border-left:3px solid var(--red)}.ti2.error{border-left:3px solid #f44}.ti2.info{border-left:3px solid var(--fg4)}
        @keyframes tIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes tOut{from{opacity:1}to{opacity:0;transform:translateX(30px)}}
        .ft2{position:relative;z-index:1;text-align:center;padding:16px;font-size:.7rem;color:var(--fg2);transition:color .35s}
        .ft2 a{color:var(--fg4);text-decoration:none;transition:color .3s}.ft2 a:hover{color:var(--red)}
        @media(max-width:576px){.up-area{padding:40px 18px;margin:14px}.abar,.ra{flex-direction:column}.abar .btn-r,.abar .btn-d,.ra .btn-r,.ra .btn-d{width:100%;justify-content:center}.pb2{padding:32px 20px}}
    </style>
</head>

    <div class="so" id="shareM"><div class="sb2"><h5><i class="fa-solid fa-share-nodes me-2" style="color:var(--red)"></i>Bagikan</h5><div class="si-r"><a class="si wa" href="#" id="sWa" target="_blank"><i class="fa-brands fa-whatsapp"></i></a><a class="si fb" href="#" id="sFb" target="_blank"><i class="fa-brands fa-facebook-f"></i></a><a class="si ig" href="#" id="sIg"><i class="fa-brands fa-instagram"></i></a><a class="si tg" href="#" id="sTg" target="_blank"><i class="fa-brands fa-telegram"></i></a><a class="si tw" href="#" id="sTw" target="_blank"><i class="fa-brands fa-x-twitter"></i></a></div><button class="sc2" id="cShare">Tutup</button></div></div>
    <div class="tw2" id="toastW"></div>
    <canvas id="expC" style="display:none"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var $=function(id){return document.getElementById(id)};
        var html=document.documentElement,dmBtn=$('dmToggle');
        var stored=localStorage.getItem('ka-theme');if(stored){html.setAttribute('data-theme',stored)}else{html.setAttribute('data-theme','dark')}updateDmIcon();
        dmBtn.addEventListener('click',function(){var c=html.getAttribute('data-theme');var n=c==='dark'?'light':'dark';html.setAttribute('data-theme',n);localStorage.setItem('ka-theme',n);updateDmIcon()});
        function updateDmIcon(){dmBtn.innerHTML=html.getAttribute('data-theme')==='dark'?'<i class="fa-solid fa-sun"></i>':'<i class="fa-solid fa-moon"></i>'}
        function showToast(m,t){t=t||'info';var w=$('toastW'),e=document.createElement('div');e.className='ti2 '+t;var ic={success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'};var cl={success:'var(--red)',error:'#f44',info:'var(--fg4)'};e.innerHTML='<i class="fa-solid '+ic[t]+'" style="color:'+cl[t]+'"></i> '+m;w.appendChild(e);setTimeout(function(){e.style.animation='tOut .3s ease forwards';setTimeout(function(){e.remove()},300)},3500)}
        document.addEventListener('keydown',function(e){if(e.key==='Escape'){$('shareM').classList.remove('a');$('procOv').classList.remove('a')}});
    </script>

    <script type="module">
        var $=function(id){return document.getElementById(id)};
        var rBFn=null,aiOK=false,uFile=null,origDu=null,pBlob=null,pDu=null;
        var selectedBgColor='transparent';
        var fullResCanvas=null,fullResCtx=null,fullResW=0,fullResH=0;
        var isGrayscale=false;
        var isAutoClean=true; // Aktifkan pembersihan maksimal secara default

        (async function(){try{var m=await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm');rBFn=m.default||m.removeBackground||m;if(typeof rBFn!=='function'){for(var k in m){if(typeof m[k]==='function'){rBFn=m[k];break}}}aiOK=true;console.log('AI ready')}catch(e){console.error('AI failed:',e);showToast('AI gagal dimuat — Reload','error')}})();

        $('uploadArea').addEventListener('click',function(){$('fileInput').click()});
        $('fileInput').addEventListener('change',function(e){if(e.target.files.length)hFile(e.target.files[0])});
        var ua=$('uploadArea');
        ua.addEventListener('dragover',function(e){e.preventDefault();ua.classList.add('dragover')});
        ua.addEventListener('dragleave',function(){ua.classList.remove('dragover')});
        ua.addEventListener('drop',function(e){e.preventDefault();ua.classList.remove('dragover');if(e.dataTransfer.files.length)hFile(e.dataTransfer.files[0])});

        function hFile(f){if(!['image/jpeg','image/png','image/webp'].includes(f.type)){showToast('Format tidak didukung.','error');return}if(f.size>20*1024*1024){showToast('File melebihi 20 MB.','error');return}uFile=f;var r=new FileReader();r.onload=function(e){origDu=e.target.result;$('previewImg').src=origDu;$('fileInfo').textContent=f.name+' \u2022 '+(f.size/1024/1024).toFixed(2)+' MB';$('uploadAreaWrap').style.display='none';$('previewSection').classList.add('a');$('resultSection').classList.remove('a');showToast('Foto berhasil diupload!','success')};r.readAsDataURL(f)}

        function reset(){uFile=null;origDu=null;pBlob=null;pDu=null;selectedBgColor='transparent';fullResCanvas=null;fullResCtx=null;isGrayscale=false;$('bwToggle').classList.remove('active-effect');resetPalette();$('fileInput').value='';$('uploadAreaWrap').style.display='block';$('previewSection').classList.remove('a');$('resultSection').classList.remove('a')}
        $('removeBtn').addEventListener('click',reset);$('newUploadBtn').addEventListener('click',reset);

        $('autoCleanBtn').addEventListener('click',function(){
            isAutoClean=!isAutoClean;
            if(isAutoClean){this.classList.add('active-effect');showToast('Auto-Clean Edge Aktif (Maksimal Bersih)','info')}
            else{this.classList.remove('active-effect');showToast('Auto-Clean Edge Nonaktif (Standar AI)','info')}
        });

        $('removeBgBtn').addEventListener('click',process);
        async function process(){
            if(!uFile)return;if(!aiOK||!rBFn){showToast('AI belum siap.','error');return}
            var ov=$('procOv'),pF=$('pF'),pS=$('pS'),pT=$('pT');
            ov.classList.add('a');pF.style.width='0%';pS.textContent='';$('removeBgBtn').disabled=true;
            try{var blob=await rBFn(uFile,{model:'large',output:{format:'image/png',quality:1},progress:function(k,c,t){var p=t>0?Math.round(c/t*100):0;if(k.includes('fetch')||k.includes('download')){pT.textContent='Mengunduh Model...';pS.textContent=p+'%'}else if(k.includes('compute')||k.includes('inference')){pT.textContent='Memproses...';pS.textContent=p+'%'}var cu=parseInt(pF.style.width)||0;pF.style.width=Math.max(p,cu)+'%'}});
            pT.textContent='Memperbaiki Tepi Objek...';pF.style.width='95%';
            var ref=await refineEdge(blob);
            pBlob=ref||blob;pDu=await b2d(pBlob);pF.style.width='100%';pS.textContent='';
            setTimeout(function(){ov.classList.remove('a');showR();showToast('Background berhasil dihapus!','success')},400);
            }catch(e){console.error(e);ov.classList.remove('a');showToast('Gagal: '+(e.message||'Error'),'error')}finally{$('removeBgBtn').disabled=false}
        }

        async function refineEdge(blob){
            return new Promise(function(resolve){
                var img=new Image();
                img.onload=function(){
                    var ow=img.width,oh=img.height,maxDim=4096,sc=1;
                    if(ow>maxDim||oh>maxDim)sc=maxDim/Math.max(ow,oh);
                    var pw=Math.round(ow*sc),ph=Math.round(oh*sc);

                    fullResCanvas=document.createElement('canvas');
                    fullResCanvas.width=pw;fullResCanvas.height=ph;
                    fullResCtx=fullResCanvas.getContext('2d',{willReadFrequently:true});
                    fullResCtx.drawImage(img,0,0,pw,ph);
                    fullResW=pw;fullResH=ph;

                    var id=fullResCtx.getImageData(0,0,pw,ph),d=id.data,len=pw*ph;

                    var origA=new Uint8Array(len);
                    for(var i=0;i<len;i++) origA[i]=d[i*4+3];

                    // Deteksi warna background dominan
                    var bgR=0,bgG=0,bgB=0,bgN=0;
                    for(var y=1;y<ph-1;y++){for(var x=1;x<pw-1;x++){
                        var i=y*pw+x;
                        if(origA[i]===0){
                            var adj=origA[(y-1)*pw+x]>0||origA[(y+1)*pw+x]>0||origA[y*pw+x-1]>0||origA[y*pw+x+1]>0;
                            if(adj){bgR+=d[i*4];bgG+=d[i*4+1];bgB+=d[i*4+2];bgN++}
                        }
                    }}
                    if(bgN<50){for(var i=0;i<len;i++){if(origA[i]===0){bgR+=d[i*4];bgG+=d[i*4+1];bgB+=d[i*4+2];bgN++}}}
                    if(bgN>0){bgR=Math.round(bgR/bgN);bgG=Math.round(bgG/bgN);bgB=Math.round(bgB/bgN)}
                    else{bgR=255;bgG=255;bgB=255}

                    var bMask=new Uint8Array(len);
                    for(var i=0;i<len;i++) bMask[i]=origA[i]>25?1:0;

                    if(isAutoClean){
                        // Erode 1px untuk memotong sisa ninja/stroke halus
                        var eroded=new Uint8Array(len);
                        for(var y=1;y<ph-1;y++){for(var x=1;x<pw-1;x++){
                            var i=y*pw+x;
                            if(bMask[i]===1 && bMask[(y-1)*pw+x]===1 && bMask[(y+1)*pw+x]===1 && bMask[y*pw+x-1]===1 && bMask[y*pw+x+1]===1){
                                eroded[i]=1;
                            }
                        }}
                        bMask=eroded;
                    }

                    // Deep interior mask (erode 5px)
                    var di=new Uint8Array(bMask);
                    for(var p=0;p<5;p++){
                        var t=new Uint8Array(len);
                        for(var y=1;y<ph-1;y++){for(var x=1;x<pw-1;x++){
                            var i=y*pw+x;
                            if(!di[i])continue;
                            if(di[(y-1)*pw+x]&&di[(y+1)*pw+x]&&di[y*pw+x-1]&&di[y*pw+x+1]) t[i]=1;
                        }}
                        di=t;
                    }
                    var hasDI=false;
                    for(var i=0;i<len;i++){if(di[i]){hasDI=true;break}}
                    if(!hasDI){for(var i=0;i<len;i++) di[i]=origA[i]>200?1:0}

                    // BFS propagate warna interior
                    var pR=new Uint8Array(len),pG=new Uint8Array(len),pB=new Uint8Array(len),pV=new Uint8Array(len);
                    var q=new Int32Array(len),qh=0,qt=0;
                    for(var i=0;i<len;i++){
                        if(di[i]){pR[i]=d[i*4];pG[i]=d[i*4+1];pB[i]=d[i*4+2];pV[i]=1;q[qt++]=i}
                    }
                    while(qh<qt){
                        var ci=q[qh++],cy=(ci/pw)|0,cx=ci%pw;
                        for(var dy=-1;dy<=1;dy++){for(var dx=-1;dx<=1;dx++){
                            if(!dy&&!dx)continue;
                            var ny=cy+dy,nx=cx+dx;
                            if(ny>=0&&ny<ph&&nx>=0&&nx<pw){
                                var ni=ny*pw+nx;
                                if(!pV[ni]&&bMask[ni]){
                                    pR[ni]=pR[ci];pG[ni]=pG[ci];pB[ni]=pB[ci];
                                    pV[ni]=1;q[qt++]=ni;
                                }
                            }
                        }}
                    }

                    // Color Decontamination, Alpha Hardening & Anti-Stroke Cleanup
                    for(var y=0;y<ph;y++){for(var x=0;x<pw;x++){
                        var i=y*pw+x;
                        var a=origA[i];
                        var r=d[i*4],g=d[i*4+1],b=d[i*4+2];

                        // Jarak warna ke background (Dominance ratio)
                        var bgD=Math.sqrt((r-bgR)*(r-bgR)+(g-bgG)*(g-bgG)+(b-bgB)*(b-bgB));

                        // Deteksi foreground hitam/gelap (Jas hitam, rambut hitam) agar tidak salah hapus
                        var lum = r*0.299 + g*0.587 + b*0.114;
                        var isDarkFg = lum < 60;

                        if(!bMask[i]){
                            // Di luar mask → transparan mutlak
                            d[i*4+3]=0;
                        } else if(a<25){
                            if(pV[i]){
                                d[i*4]=pR[i];d[i*4+1]=pG[i];d[i*4+2]=pB[i];d[i*4+3]=220;
                            } else {
                                d[i*4+3]=0;
                            }
                        } else if(a>=25&&a<200){
                            var af=a/255;
                            var fR=(r-(1-af)*bgR)/af;
                            var fG=(g-(1-af)*bgG)/af;
                            var fB=(b-(1-af)*bgB)/af;
                            
                            // Jika hasil defringing meledak (over-corrected), dan itu foreground gelap, paksa ke warna interior
                            var valid=fR>=0&&fR<=255&&fG>=0&&fG<=255&&fB>=0&&fB<=255;
                            if(!valid && isDarkFg && pV[i]){
                                fR=pR[i]; fG=pG[i]; fB=pB[i]; valid=true;
                            }

                            if(valid){
                                d[i*4]=Math.round(fR);
                                d[i*4+1]=Math.round(fG);
                                d[i*4+2]=Math.round(fB);
                            } else if(pV[i]){
                                d[i*4]=pR[i];d[i*4+1]=pG[i];d[i*4+2]=pB[i];
                            }
                            d[i*4+3]=Math.min(255, Math.round(a*1.25));
                        } else {
                            // Spill suppression untuk objek solid (menghapus pantulan merah di jas)
                            if(pV[i]){
                                var fLum = pR[i]*0.299 + pG[i]*0.587 + pB[i]*0.114;
                                var spill = 0;
                                if(fLum < 80){ // Objek gelap, sangat sensitif terhadap pantulan
                                    spill = Math.max(0, (120 - bgD) / 120) * 0.85;
                                } else if(bgD < 120){ // Objek terang
                                    spill = (120-bgD)/120 * 0.5;
                                }
                                if(spill > 0){
                                    d[i*4]=Math.round(r*(1-spill)+pR[i]*spill);
                                    d[i*4+1]=Math.round(g*(1-spill)+pG[i]*spill);
                                    d[i*4+2]=Math.round(b*(1-spill)+pB[i]*spill);
                                }
                            }
                            d[i*4+3]=255;
                        }
                    }}

                    fullResCtx.putImageData(id,0,0);

                    var pvW=pw,pvH=ph,pvMax=1200;
                    if(pvW>pvMax||pvH>pvMax){var pvSc=pvMax/Math.max(pvW,pvH);pvW=Math.round(pvW*pvSc);pvH=Math.round(pvH*pvSc)}
                    var pvCv=document.createElement('canvas');pvCv.width=pvW;pvCv.height=pvH;
                    var pvCtx=pvCv.getContext('2d');pvCtx.drawImage(fullResCanvas,0,0,pvW,pvH);
                    pvCv.toBlob(function(b){resolve(b)},'image/png');
                };
                img.onerror=function(){resolve(null)};
                img.src=URL.createObjectURL(blob);
            });
        }

        function b2d(b){return new Promise(function(r,j){var rd=new FileReader();rd.onload=function(){r(rd.result)};rd.onerror=j;rd.readAsDataURL(b)})}

        function showR(){$('resBefore').src=origDu;$('resAfter').src=pDu;$('previewSection').classList.remove('a');$('resultSection').classList.add('a');selectedBgColor='transparent';resetPalette();setTimeout(function(){$('resultSection').scrollIntoView({behavior:'smooth',block:'center'})},200)}

        /* PALETTE LOGIC */
        var swatches=document.querySelectorAll('.pal-swatch');
        swatches.forEach(function(sw){sw.addEventListener('click',function(){swatches.forEach(function(s){s.classList.remove('active')});$('palCenter').classList.remove('active');sw.classList.add('active');selectedBgColor=sw.getAttribute('data-color');applyBgColor(selectedBgColor)})});
        $('customColor').addEventListener('input',function(){var color=$('customColor').value;swatches.forEach(function(s){s.classList.remove('active')});$('palCenter').classList.add('active');$('palCenterColor').style.background=color;$('palCenter').classList.add('has-color');selectedBgColor=color;applyBgColor(selectedBgColor)});
        function resetPalette(){swatches.forEach(function(s){s.classList.remove('active')});$('palCenter').classList.remove('active','has-color');$('palCenterColor').style.background='transparent';var first=document.querySelector('.pal-swatch.transparent-swatch');if(first)first.classList.add('active');selectedBgColor='transparent'}

        function applyBgColor(color){
            var afterWrap=$('afterWrap'),afterImg=$('resAfter');
            if(color==='transparent'){afterWrap.style.background='var(--chk)';afterImg.src=getProcessedPreview()} 
            else{afterWrap.style.background=color;compositePreview(color,function(dataUrl){afterImg.src=dataUrl})}
        }

        function getProcessedPreview(){
            if(!fullResCanvas) return pDu;
            var tempCv=document.createElement('canvas');
            tempCv.width=fullResCanvas.width;tempCv.height=fullResCanvas.height;
            var ctx=tempCv.getContext('2d');
            ctx.drawImage(fullResCanvas,0,0);
            if(isGrayscale) applyGrayscaleToCtx(ctx, tempCv.width, tempCv.height);
            return tempCv.toDataURL('image/png');
        }

        function compositePreview(color,callback){
            var img=new Image();img.onload=function(){
                var cv=document.createElement('canvas'),ctx=cv.getContext('2d');
                cv.width=img.width;cv.height=img.height;
                ctx.fillStyle=color;ctx.fillRect(0,0,cv.width,cv.height);
                ctx.drawImage(img,0,0);
                if(isGrayscale) applyGrayscaleToCtx(ctx, cv.width, cv.height);
                callback(cv.toDataURL('image/png'));
            };img.src=pDu;
        }

        function applyGrayscaleToCtx(ctx, w, h){
            var id=ctx.getImageData(0,0,w,h),d=id.data;
            for(var i=0;i<d.length;i+=4){
                if(d[i+3]>0){
                    var gray=Math.round(0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]);
                    d[i]=gray;d[i+1]=gray;d[i+2]=gray;
                }
            }
            ctx.putImageData(id,0,0);
        }

        $('bwToggle').addEventListener('click',function(){
            isGrayscale=!isGrayscale;
            if(isGrayscale){this.classList.add('active-effect');showToast('Efek Hitam Putih Aktif','info')}
            else{this.classList.remove('active-effect');showToast('Efek Hitam Putih Nonaktif','info')}
            applyBgColor(selectedBgColor);
        });

        /* 300 DPI INJECTOR */
        function setPngDpi(pngBlob,dpi){return new Promise(function(resolve){var ppm=Math.round(dpi/0.0254);var reader=new FileReader();reader.onload=function(){var data=new Uint8Array(reader.result);var offset=8;var len=((data[offset]<<24)|(data[offset+1]<<16)|(data[offset+2]<<8)|data[offset+3]);offset+=12+len;var phys=new Uint8Array(21);phys[0]=0;phys[1]=0;phys[2]=0;phys[3]=9;phys[4]=0x70;phys[5]=0x48;phys[6]=0x59;phys[7]=0x73;phys[8]=(ppm>>>24)&0xFF;phys[9]=(ppm>>>16)&0xFF;phys[10]=(ppm>>>8)&0xFF;phys[11]=ppm&0xFF;phys[12]=(ppm>>>24)&0xFF;phys[13]=(ppm>>>16)&0xFF;phys[14]=(ppm>>>8)&0xFF;phys[15]=ppm&0xFF;phys[16]=1;var crcData=new Uint8Array(13);for(var i=0;i<4;i++)crcData[i]=phys[4+i];for(var i=0;i<9;i++)crcData[4+i]=phys[8+i];var crc=crc32(crcData);phys[17]=(crc>>>24)&0xFF;phys[18]=(crc>>>16)&0xFF;phys[19]=(crc>>>8)&0xFF;phys[20]=crc&0xFF;var before=data.slice(0,offset);var after=data.slice(offset);var result=new Uint8Array(before.length+phys.length+after.length);result.set(before,0);result.set(phys,before.length);result.set(after,before.length+phys.length);resolve(new Blob([result],{type:'image/png'}))};reader.readAsArrayBuffer(pngBlob)})}
        function crc32(buf){var c,crcTable=[];for(var n=0;n<256;n++){c=n;for(var k=0;k<8;k++){if(c&1)c=0xEDB88320^(c>>>1);else c=c>>>1}crcTable[n]=c}var crc=0xFFFFFFFF;for(var i=0;i<buf.length;i++){crc=crcTable[(crc^buf[i])&0xFF]^(crc>>>8)}return(crc^0xFFFFFFFF)>>>0}

        /* DOWNLOAD HD 300 DPI */
        $('dlPng').addEventListener('click',function(){
            if(!pDu)return;showToast('Menyiapkan PNG HD 300dpi...','info');
            if(fullResCanvas){
                var cv=document.createElement('canvas');cv.width=fullResW;cv.height=fullResH;var ctx=cv.getContext('2d');
                if(selectedBgColor!=='transparent'){ctx.fillStyle=selectedBgColor;ctx.fillRect(0,0,fullResW,fullResH);}
                ctx.drawImage(fullResCanvas,0,0);
                if(isGrayscale) applyGrayscaleToCtx(ctx, fullResW, fullResH);
                
                cv.toBlob(function(b){setPngDpi(b,300).then(function(dpiBlob){
                    var name=isGrayscale?'karya-abadi-BW-nobg.png':'karya-abadi-nobg.png';
                    if(selectedBgColor!=='transparent') name=isGrayscale?'karya-abadi-BW-bg.png':'karya-abadi-bg.png';
                    dLB(dpiBlob,name);showToast('PNG HD 300dpi berhasil! '+fullResW+'\u00D7'+fullResH+'px','success')
                })},'image/png')
            } else { dLB(pBlob,'karya-abadi.png');showToast('PNG berhasil!','success') }
        });

        $('dlJpg').addEventListener('click',function(){
            if(!pDu)return;var bgColor=selectedBgColor==='transparent'?'#FFFFFF':selectedBgColor;showToast('Menyiapkan JPG 300dpi...','info');
            if(fullResCanvas){
                var cv=$('expC');cv.width=fullResW;cv.height=fullResH;var ctx=cv.getContext('2d');
                ctx.fillStyle=bgColor;ctx.fillRect(0,0,fullResW,fullResH);ctx.drawImage(fullResCanvas,0,0);
                if(isGrayscale) applyGrayscaleToCtx(ctx, fullResW, fullResH);
                cv.toBlob(function(b){
                    var name=isGrayscale?'karya-abadi-BW.jpg':'karya-abadi.jpg';
                    dLB(b,name);showToast('JPG 300dpi berhasil! '+fullResW+'\u00D7'+fullResH+'px','success')
                },'image/jpeg',1.0)
            } else {
                var img=new Image();img.onload=function(){var cv=$('expC');cv.width=img.width;cv.height=img.height;var ctx=cv.getContext('2d');ctx.fillStyle=bgColor;ctx.fillRect(0,0,cv.width,cv.height);ctx.drawImage(img,0,0);if(isGrayscale) applyGrayscaleToCtx(ctx, cv.width, cv.height);cv.toBlob(function(b){dLB(b,'karya-abadi.jpg');showToast('JPG berhasil!','success')},'image/jpeg',1.0)};img.src=pDu
            }
        });

        function dLB(b,n){var u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(u)},1000)}

        $('shareBtn').addEventListener('click',function(){$('shareM').classList.add('a')});
        $('cShare').addEventListener('click',function(){$('shareM').classList.remove('a')});
        $('shareM').addEventListener('click',function(e){if(e.target===$('shareM'))$('shareM').classList.remove('a')});
        var sT='Hapus background foto otomatis dengan AI di KARYA ABADI!',sU=window.location.href;
        $('sWa').href='https://wa.me/?text='+encodeURIComponent(sT+' '+sU);
        $('sFb').href='https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(sU);

        $('sTg').href='https://t.me/share/url?url='+encodeURIComponent(sU)+'&text='+encodeURIComponent(sT);
        $('sIg').addEventListener('click',function(e){e.preventDefault();showToast('Download hasil lalu share ke Instagram! 📸','info')});
